<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercicio 5</title>
  <style>
    @media only screen and (max-width: 600px) {
      body {
        background-color: black;
      }

      h1 {
        font-size: 22px;
        color: white;
      }

      p {
        font-size: 14px;
        color: white;
      }
    }

    @media only screen and (min-width: 768px) {
      body {
        background-color: blue;
      }

      h1 {
        font-size: 24px;
        color: black;
      }

      p {
        font-size: 18px;
        color: black;
      }
    }

    @media only screen and (min-width: 992px) {
      body {
        background-color: purple;
      }

      h1 {
        font-size: 30px;
        color: yellow;
      }

      p {
        font-size: 10px;
        color: yellow;
      }
    }

    @media only screen and (min-width: 1200px) {
      body {
        background-color: red;
      }

      h1 {
        font-size: 40px;
        color: white;
      }

      p {
        font-size: 30px;
        color: white;
      }
    }
  </style>
</head>
<body>
  <h1>Título 1</h1>
  <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusamus repellendus recusandae enim exercitationem placeat libero, eligendi ex! Cupiditate, eos vitae fuga ullam hic unde natus nesciunt laborum culpa tempora! Placeat!</p>
</body>
</html>
