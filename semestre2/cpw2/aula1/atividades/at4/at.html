<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 4</title>
  <style>
    #quadrado {
      width: 50px;
      height: 50px;            background-color: purple;
      position: relative;
      top:0;
      left:0;
      transition: all 3s ease;
    }
  </style>
</head>
<body>
  <div id="quadrado"></div>
  <br>
  <button onclick="moverDireita()">Mover para Direita</button>
  <button onclick="moverEsquerda()">Mover para Esquerda</button>
  <script>
    let quadrado = document.getElementById("quadrado")
    moverDireita = () => {
      quadrado.style.left="225px"
    }
    moverEsquerda = () => {
      quadrado.style.left="0"
    }
  </script>
</body>
</html>
