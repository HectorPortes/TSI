<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex 1 e 2</title>
</head>
<body>
  <label for="valor">Valor</label>
  <input type="number" id="valor" required>

  <br><br>

  <button type="button" onclick="arredondar()">Arredondar</button>

  <button type="button" onclick="raiz()">Raiz</button>

  <script>
    const arredondar = () => {
      let valor = parseFloat(document.getElementById("valor").value);
      let valor1 = Math.round(valor);
      let valor2 = Math.floor(valor);
      let valor3 = Math.ceil(valor);
      return alert(`Valor arredondado para cima ou baixo dependendo da casa após o virgula: ${valor1}\nValor arredondado para cima: ${valor3}\nValor arredondado para baixo: ${valor2}`);
    }

    const raiz = () => {
      let valor = parseFloat(document.getElementById("valor").value);
      if(valor > 0) {
        let valor4 = Math.trunc(valor)
      let valor5 = Math.sqrt(valor4)
      return alert(`Arredondando o valor ${valor} é ${valor4} e sua raiz é ${valor5}`)
      } else {
        return alert("Impossivel tirar a raiz, número negativo.")
      }
    }
  </script>
</body>
</html>
