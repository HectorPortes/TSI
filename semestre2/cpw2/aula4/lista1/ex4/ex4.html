<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex4</title>
</head>
<body>
  <label for="valor1">Valor</label>
  <input type="number" id="valor1" required>
  
  <br><br>
  
  <label for="valor2">Valor</label>
  <input type="number" id="valor2" required>
  
  <br><br>
  
  <button type="button" onclick="verificar()">Enviar</button>

  <p id="resultado"></p>

  <script>
    verificar = () => {
      let valor1 = document.getElementById("valor1").value;
      let valor2 = document.getElementById("valor2").value;
      let res1, res2, res3;
      if(valor1 == valor2){res1 = 'Valor é igual'}
      else {res1 = 'Valor é diferente'}
      if(valor1 === valor2){res2 = 'Valor é igual'}
      else {res2 = 'Valor é diferente'}
      if(valor1 != valor2){res3 = 'true'}
      else {res3 = 'false'}
      return alert(`${valor1} == ${valor2}: ${res1}\n${valor1} === ${valor2}: ${res2}\n${valor1} != ${valor2}: ${res3}`);
    }
  </script>
</body>
</html>
