<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form>
    <label for="idade1">Idade:</label>
    <input type="number" id="idade1" required>

    <br><br>

    <label for="idade2">Idade:</label>
    <input type="number" id="idade2" required>

    <br><br>

    <button type="button" onclick="comparar()">Comparar</button>
    <button type="button" onclick="verificadorIdade()">Verificar quem é +18</button>
  </form>

  <script>
    const comparar = () => {
      let idade1 = document.getElementById("idade1").value
      let idade2 = document.getElementById("idade2").value
      if (idade1 === idade2){
        alert(`${idade1} e ${idade2} são da mesma idade.`)
      } else {
        alert(`${idade1} e ${idade2} não são da mesma idade.`)
      }
    }

    const verificadorIdade = () => {
      let idade1 = document.getElementById("idade1").value
      let idade2 = document.getElementById("idade2").value
      let mensagem = ""
      if (idade1 >= 18 && idade2 >= 18) {
        mensagem += `${idade1} e ${idade2} são de maiores.\n`
      } else {
        if (idade1 >= 18){
          mensagem += `${idade1} é de maior.\n`
        }
        if (idade2 >= 18){
          mensagem += `${idade2} é de maior.`
        }
        if (idade1 < 18 && idade2 < 18){
          mensagem += `Nem ${idade1} e ${idade2} são de maiores.`
        }
      }
      return alert(mensagem)
    }
  </script>
</body>
</html>
