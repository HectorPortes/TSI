<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo 1 do slide</title>
</head>
<body>
  <h2>Meus Números da Sorte</h2>

  <p id="resultado"></p>

  <script>
    const numeros = [45, 4, 9, 16, 25]

    let textoFinal = ""

    const adicionarAoTexto = (valor) => {
      textoFinal += valor + " - "
    }

    // Ele pega a lista 'numeros' e manda executar a funçãi acima para cada item
    numeros.forEach(adicionarAoTexto);
    document.getElementById("resultado").innerHTML = textoFinal;
  </script>
</body>
</html>
