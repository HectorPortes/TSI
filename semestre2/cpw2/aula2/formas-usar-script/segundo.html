<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Este é um exemplo de script carregado no body.</title>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este é um exemplo de script carregado no body.</p>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            alert('O conteúdo do body foi carregado!')
        })
    </script>
</body>
</html>
