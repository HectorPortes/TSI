<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex5</title>
</head>
<body>
    <img id="imagem" src="images/wallpaperdia.png" style="width:333px">
    <br><br>
    <button onclick="mudar()">Mudar</button>
    <script>
        function mudar() {
            let img = document.getElementById("imagem")
            if (img.getAttribute("src") === "images/wallpaperdia.png") {
                img.src = "images/wallpapernoite.png"
            } else {
                img.src = "images/wallpaperdia.png"
            }
        }
    </script>
</body>
</html>
